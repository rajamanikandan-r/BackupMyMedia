<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – Cloud Image Vault</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="min-height:100vh;">
    <div class="card shadow-sm p-5 text-center" style="max-width:360px;width:100%;">
        <h4 class="mb-1">📸 My Cloud Gallery</h4>
        <p class="text-muted mb-4">Sign in to access your vault</p>
        {% if error %}
        <div class="alert alert-danger py-2">{{ error }}</div>
        {% endif %}
        <a href="/login/google" class="btn btn-outline-dark w-100">
            <img src="https://www.svgrepo.com/show/475656/google-color.svg" width="20" class="me-2" alt="Google">
            Sign in with Google
        </a>
    </div>
</body>
</html>
